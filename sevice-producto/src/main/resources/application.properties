spring.application.name=sevice-producto
server.port=8081
#conexion con base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_producto?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password: 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/producto/v3/api-docs
#Titulo de la documentación
springdoc.swagger-ui.path=/swagger-ui.html