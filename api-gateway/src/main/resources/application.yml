server:
  port: 8080

jwt:
  secret: "LoyalKicks2025SecretKeyParaFirmarTokensJWT!!"

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:8080"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"

          routes:
            # ── AUNT ──
            
            - id: service-auth-docs
              uri: http://localhost:8085
              predicates:
                - Path=/auth/v3/api-docs
            
            - id: service-auth
              uri: http://localhost:8085
              predicates:
                - Path=/auth/**

            # ── PRODUCTO ──
            - id: service-producto-docs
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/productos/v3/api-docs
            
            - id: service-producto
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/productos/**, /api/v1/marcas/**, /api/v1/tipos/**
              filters:
                - AuthenticationFilter

            
            # ── INVENTARIO ──

            - id: service-inventario-docs
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/inventario/v3/api-docs
            
            - id: service-inventario
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/inventario/**
              filters:
                - AuthenticationFilter

            # ── PEDIDO ──

            - id: service-pedido-docs
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/pedidos/v3/api-docs
            
            - id: service-pedido
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/pedidos/**
              filters:
                - AuthenticationFilter

            
            # ── CLIENTE ──

            - id: service-cliente-docs
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/clientes/v3/api-docs

            - id: service-cliente
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/clientes/**
              filters:
                - AuthenticationFilter

            # ── SUCURSAL ──

            - id: service-sucursal-docs
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/sucursales/v3/api-docs

            - id: service-sucursal
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/sucursales/**
              filters:
                - AuthenticationFilter


            # ── PROVEEDOR ──

            - id: service-proveedor-docs
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/proveedores/v3/api-docs
            
            - id: service-proveedor
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/proveedores/**
              filters:
                - AuthenticationFilter


            # ── PAGO ──

            - id: service-pago-docs
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/pagos/v3/api-docs

            - id: service-pago
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/pagos/**
              filters:
                - AuthenticationFilter


            # ── ENVIO ──

            - id: service-envio-docs
              uri: http://localhost:8089
              predicates:
                - Path=/api/v1/envios/v3/api-docs

            - id: service-envio
              uri: http://localhost:8089
              predicates:
                - Path=/api/v1/envios/**
              filters:
                - AuthenticationFilter


            # ── DEVOLUCION ──

            - id: service-devolucion-docs
              uri: http://localhost:8090
              predicates:
                - Path=/api/v1/devoluciones/v3/api-docs

            - id: service-devolucion
              uri: http://localhost:8090
              predicates:
                - Path=/api/v1/devoluciones/**
              filters:
                - AuthenticationFilter

            # ── REPORTE ──

            - id: service-reporte-docs
              uri: http://localhost:8091
              predicates:
                - Path=/api/v1/reportes/v3/api-docs

            - id: service-reporte
              uri: http://localhost:8091
              predicates:
                - Path=/api/v1/reportes/**
              filters:
                - AuthenticationFilter

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Servicio Auth
        url: /auth/v3/api-docs
      - name: Servicio Producto
        url: /api/v1/productos/v3/api-docs
      - name: Servicio Inventario
        url: /api/v1/inventario/v3/api-docs
      - name: Servicio Pedido
        url: /api/v1/pedidos/v3/api-docs
      - name: Servicio Cliente
        url: /api/v1/clientes/v3/api-docs
      - name: Servicio Sucursal
        url: /api/v1/sucursales/v3/api-docs
      - name: Servicio Proveedor
        url: /api/v1/proveedores/v3/api-docs
      - name: Servicio Pago
        url: /api/v1/pagos/v3/api-docs
      - name: Servicio Envio
        url: /api/v1/envios/v3/api-docs
      - name: Servicio Devolucion
        url: /api/v1/devoluciones/v3/api-docs
      - name: Servicio Reporte
        url: /api/v1/reportes/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info
