server:
  port: 8080

jwt:
  secret: "LoyalKicks2025SecretKeyParaFirmarTokensJWT!!"   

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:

        - id: service-auth
          uri: http://localhost:8085
          predicates:
            - Path=/auth/**

        - id: service-auth-docs
          uri: http://localhost:8085
          predicates:
            - Path=/auth/v3/api-docs

        # ── PRODUCTO ──
        - id: service-producto
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/productos/**, /api/v1/marcas/**, /api/v1/tipos/**
          filters:
            - AuthenticationFilter

        - id: service-producto-docs
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/productos/v3/api-docs

        # ── INVENTARIO ──
        - id: service-inventario
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/inventario/**
          filters:
            - AuthenticationFilter

        - id: service-inventario-docs
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/inventario/v3/api-docs

        # ── PEDIDO ──
        - id: service-pedido
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/pedidos/**
          filters:
            - AuthenticationFilter

        - id: service-pedido-docs
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/pedidos/v3/api-docs

        # ── CLIENTE ──
        - id: service-cliente
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/clientes/**
          filters:
            - AuthenticationFilter

        - id: service-cliente-docs
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/clientes/v3/api-docs

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Servicio Auth
        url: /auth/v3/api-docs
      - name: Servicio Producto
        url: /api/v1/productos/v3/api-docs
      - name: Servicio Inventario
        url: /api/v1/inventario/v3/api-docs
      - name: Servicio Pedido
        url: /api/v1/pedidos/v3/api-docs
      - name: Servicio Cliente
        url: /api/v1/clientes/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info 