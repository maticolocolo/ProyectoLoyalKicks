spring.application.name=service-inventario
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/db_inventario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/api/v1/inventario/v3/api-docs
#Titulo de la documentación
springdoc.swagger-ui.path=/swagger-ui.html